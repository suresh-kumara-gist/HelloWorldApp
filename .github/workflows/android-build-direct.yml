name: Direct Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        # Install Android SDK tools
        mkdir -p ~/android-sdk/cmdline-tools
        cd ~/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools cmdline-tools/latest
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        
        # Accept licenses
        yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install required platforms
        ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0"
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.0-bin.zip
        unzip gradle-8.0-bin.zip
        echo "$(pwd)/gradle-8.0/bin" >> $GITHUB_PATH
    
    - name: Build APK
      run: gradle build --no-daemon
    
    - name: Locate APK files
      run: |
        echo "Searching for APK files..."
        find app/build -name "*.apk" -exec ls -lh {} \;
        
        # Create artifacts directory
        mkdir -p artifacts
        
        # Copy all APKs
        find app/build -name "*.apk" -exec cp {} artifacts/ \;
        
        # Rename for clarity
        cd artifacts
        for f in *.apk; do
          if [[ $f == *"debug"* ]]; then
            mv "$f" hello-world-v1.0-debug.apk 2>/dev/null || true
          fi
          if [[ $f == *"release"* ]]; then
            mv "$f" hello-world-v1.0-release.apk 2>/dev/null || true
          fi
        done
        cd ..
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: artifacts/*.apk
        retention-days: 30