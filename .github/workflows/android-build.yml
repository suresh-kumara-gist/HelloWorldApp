name: Android CI/CD - Auto Build APKs

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run Lint Check
      run: ./gradlew lint --no-daemon
    
    - name: Run Unit Tests
      run: ./gradlew test --no-daemon
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
    
    - name: Rename APKs for easy download
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/hello-world-v1.0-debug.apk
        cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/hello-world-v1.0-release.apk 2>/dev/null || echo "Release APK created"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: hello-world-debug-apk
        path: app/build/outputs/apk/debug/hello-world-v1.0-debug.apk
        retention-days: 30
        compression-level: 0
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: hello-world-release-apk
        path: app/build/outputs/apk/release/hello-world-v1.0-release.apk
        retention-days: 30
        compression-level: 0
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 7
    
    - name: Upload Lint Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: app/build/reports/lint-results.html
        retention-days: 7
    
    - name: Build Summary
      run: |
        echo "## Build Successful! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK Files Generated:" >> $GITHUB_STEP_SUMMARY
        echo "- Debug APK: \`hello-world-v1.0-debug.apk\`" >> $GITHUB_STEP_SUMMARY
        echo "- Release APK: \`hello-world-v1.0-release.apk\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to **Actions** tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Scroll to **Artifacts** section" >> $GITHUB_STEP_SUMMARY
        echo "4. Download the APK files" >> $GITHUB_STEP_SUMMARY