name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew build --no-daemon
    
    - name: Find APK files
      run: |
        find . -name "*.apk" -type f
        mkdir -p apk-output
    
    - name: Copy APKs to output
      run: |
        find . -name "*.apk" -exec cp {} apk-output/ \;
        ls -la apk-output/
    
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: app-apks
        path: apk-output/*.apk
        retention-days: 30