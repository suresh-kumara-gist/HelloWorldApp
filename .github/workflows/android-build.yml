name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
    
    - name: List generated APKs
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || echo "No debug APK"
        echo ""
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || echo "No release APK"
    
    - name: Rename APKs
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          cp app/build/outputs/apk/debug/app-debug.apk hello-world-v1.0-debug.apk
          echo "✅ Debug APK ready"
        fi
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk hello-world-v1.0-release.apk
          echo "✅ Release APK ready"
        fi
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: hello-world-debug-apk
        path: hello-world-v1.0-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: hello-world-release-apk
        path: hello-world-v1.0-release.apk
        retention-days: 30